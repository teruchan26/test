<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦績入力 - 星の翼</title>
    <link rel="stylesheet" href="input.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html">トップ</a>
        <a href="input.html" class="active">戦績入力</a>
        <a href="history.html">戦績確認</a>
    </nav>

    <div class="container">
        <h2>戦績の記録</h2>

        <div class="csv-actions">
            <button type="button" class="btn-small" onclick="exportCSV()">CSVをエクスポート</button>
            <label class="btn-small file-label">
                CSVをインポート
                <input type="file" id="csv-file" accept=".csv" onchange="importCSV(this)" style="display:none;">
            </label>
        </div>

        <form id="match-form">
            <div class="form-section">
                <h3>対戦日時</h3>
                <input type="datetime-local" id="match-date" class="form-control" required>
            </div>

            <div class="form-section">
                <h3>1. 持ち込みキャラクター (各4人)</h3>
                <div class="form-group">
                    <label>自分の持ち込み4人</label>
                    <div class="pool-grid">
                        <button type="button" class="btn-char-select" data-id="my-pool-1">1</button>
                        <input type="hidden" id="my-pool-1" required>
                        <button type="button" class="btn-char-select" data-id="my-pool-2">2</button>
                        <input type="hidden" id="my-pool-2" required>
                        <button type="button" class="btn-char-select" data-id="my-pool-3">3</button>
                        <input type="hidden" id="my-pool-3" required>
                        <button type="button" class="btn-char-select" data-id="my-pool-4">4</button>
                        <input type="hidden" id="my-pool-4" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>味方の持ち込み4人</label>
                    <div class="pool-grid">
                        <button type="button" class="btn-char-select" data-id="teammate-pool-1">1</button>
                        <input type="hidden" id="teammate-pool-1" required>
                        <button type="button" class="btn-char-select" data-id="teammate-pool-2">2</button>
                        <input type="hidden" id="teammate-pool-2" required>
                        <button type="button" class="btn-char-select" data-id="teammate-pool-3">3</button>
                        <input type="hidden" id="teammate-pool-3" required>
                        <button type="button" class="btn-char-select" data-id="teammate-pool-4">4</button>
                        <input type="hidden" id="teammate-pool-4" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>2. 自分たちが指定したBan (各1人)</h3>
                <div class="grid-2col">
                    <div class="form-group">
                        <label>自分がBanした</label>
                        <button type="button" class="btn-char-select" data-id="my-ban">選択</button>
                        <input type="hidden" id="my-ban" required>
                    </div>
                    <div class="form-group">
                        <label>味方がBanした</label>
                        <button type="button" class="btn-char-select" data-id="teammate-ban">選択</button>
                        <input type="hidden" id="teammate-ban" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>3. 相手からBanされたキャラ (最大各2人)</h3>
                <div class="grid-2col">
                    <div class="form-group">
                        <label>自分がBanされた</label>
                        <div class="grid-2col">
                            <button type="button" class="btn-char-select" data-id="my-banned-1">1人目</button>
                            <input type="hidden" id="my-banned-1">
                            <button type="button" class="btn-char-select" data-id="my-banned-2">2人目</button>
                            <input type="hidden" id="my-banned-2">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>味方がBanされた</label>
                        <div class="grid-2col">
                            <button type="button" class="btn-char-select" data-id="teammate-banned-1">1人目</button>
                            <input type="hidden" id="teammate-banned-1">
                            <button type="button" class="btn-char-select" data-id="teammate-banned-2">2人目</button>
                            <input type="hidden" id="teammate-banned-2">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>4. 最終ピックキャラクター</h3>
                <div class="grid-2col">
                    <div class="form-group">
                        <label>自分がPickした</label>
                        <button type="button" class="btn-char-select" data-id="my-pick">選択</button>
                        <input type="hidden" id="my-pick" required>
                    </div>
                    <div class="form-group">
                        <label>味方がPickした</label>
                        <button type="button" class="btn-char-select" data-id="teammate-pick">選択</button>
                        <input type="hidden" id="teammate-pick" required>
                    </div>
                </div>
                <div class="grid-2col" style="margin-top: 10px;">
                    <div class="form-group">
                        <label>相手のPick 1</label>
                        <button type="button" class="btn-char-select" data-id="enemy-pick-1">選択</button>
                        <input type="hidden" id="enemy-pick-1" required>
                    </div>
                    <div class="form-group">
                        <label>相手のPick 2</label>
                        <button type="button" class="btn-char-select" data-id="enemy-pick-2">選択</button>
                        <input type="hidden" id="enemy-pick-2" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>5. 勝負の結果</h3>
                <div class="result-toggle">
                    <button type="button" class="btn-result btn-win" id="btn-win">WIN</button>
                    <button type="button" class="btn-result btn-lose" id="btn-lose">LOSE</button>
                </div>
            </div>

            <button type="submit" class="btn btn-submit">試合結果を保存</button>
        </form>
    </div>

    <div class="modal-overlay" id="char-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>キャラクターを選択</h3>
                <button type="button" class="modal-close" id="modal-close-btn">×</button>
            </div>
            
            <div class="modal-tabs">
                <button type="button" class="modal-tab active" data-cost="ALL">ALL</button>
                <button type="button" class="modal-tab" data-cost="3.0">3.0</button>
                <button type="button" class="modal-tab" data-cost="2.5">2.5</button>
                <button type="button" class="modal-tab" data-cost="2.0">2.0</button>
                <button type="button" class="modal-tab" data-cost="1.5">1.5</button>
            </div>

            <div class="char-selection-grid" id="modal-char-grid"></div>
            <button type="button" class="btn-clear-select" id="btn-clear-selection">選択をクリア</button>
        </div>
    </div>

    <script src="input.js"></script>
</body>
</html>
